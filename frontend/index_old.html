<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Evaluation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .eval-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .eval-row .form-group {
            margin-bottom: 0;
            flex: 1 1 280px;
            min-width: 0;
        }

        .eval-row .action-group {
            flex: 0 0 auto;
        }

        .eval-row button {
            width: auto;
            padding-left: 24px;
            padding-right: 24px;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .eval-row {
                flex-direction: column;
                align-items: stretch;
            }

            .eval-row button {
                width: 100%;
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .documents-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .document-item {
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .document-item strong {
            color: #667eea;
        }

        .response-area {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            min-height: 200px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .report-output {
            width: 100%;
            min-height: 420px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            background: #f9f9f9;
            font-size: 14px;
            overflow: auto;
        }

        /* Minimal markdown styling inside the report area */
        .report-output h1,
        .report-output h2,
        .report-output h3 {
            color: #333;
            margin: 12px 0 8px;
        }

        .report-output p {
            margin: 8px 0;
            color: #333;
        }

        .report-output ul,
        .report-output ol {
            margin: 8px 0 8px 20px;
            color: #333;
        }

        .report-output code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .report-output pre {
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            background: white;
            overflow: auto;
        }

        .report-output blockquote {
            margin: 10px 0;
            padding: 8px 12px;
            border-left: 4px solid #667eea;
            background: white;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ESG Evaluation</h1>
            <p>Select a company and an evaluation criterion</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Evaluation Setup</h2>
                <form id="esgEvalForm">
                    <div class="eval-row">
                        <div class="form-group">
                            <label for="companySelect">Company</label>
                            <select id="companySelect" required>
                                <option value="" selected disabled>Select a company...</option>
                                <option value="apple">Apple</option>
                                <option value="microsoft">Microsoft</option>
                                <option value="tesla">Tesla</option>
                                <option value="unilever">Unilever</option>
                                <option value="nestle">Nestlé</option>
                                <option value="bp">BP</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="criteriaSelect">ESG Evaluation Criterion</label>
                            <select id="criteriaSelect" required>
                                <option value="" selected disabled>Select a criterion...</option>
                                <option value="overall">Overall ESG Assessment</option>
                                <option value="environment">Environment (E) Summary</option>
                                <option value="social">Social (S) Summary</option>
                                <option value="governance">Governance (G) Summary</option>
                                <option value="emissions">GHG Emissions & Decarbonization</option>
                                <option value="energy">Energy Use & Efficiency</option>
                                <option value="waste">Waste & Circularity</option>
                                <option value="water">Water Use & Stewardship</option>
                                <option value="biodiversity">Biodiversity & Land Use</option>
                                <option value="supply_chain">Supply Chain Sustainability</option>
                                <option value="labor">Labor Practices & Working Conditions</option>
                                <option value="human_rights">Human Rights & Due Diligence</option>
                                <option value="dei">Diversity, Equity & Inclusion</option>
                                <option value="community">Community Impact</option>
                                <option value="health_safety">Health & Safety</option>
                                <option value="ethics">Business Ethics & Anti-Corruption</option>
                                <option value="board">Board Structure & Independence</option>
                                <option value="exec_pay">Executive Compensation Alignment</option>
                                <option value="privacy">Data Privacy</option>
                                <option value="cybersecurity">Cybersecurity & Risk Management</option>
                                <option value="transparency">Transparency & Reporting Quality</option>
                            </select>
                        </div>
                        <div class="form-group action-group">
                            <label aria-hidden="true">&nbsp;</label>
                            <button type="submit">Evaluate</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2>Evaluation Report</h2>
                <div id="reportOutput" class="report-output">Choose a company and a criterion, then click Evaluate.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    <script>
        let activeTypingTimer = null;

        function renderMarkdownInto(element, markdownText) {
            // Render markdown and sanitize (important if content comes from a backend)
            const html = window.marked ? window.marked.parse(markdownText, { breaks: true }) : markdownText;
            element.innerHTML = window.DOMPurify ? window.DOMPurify.sanitize(html) : html;
        }

        function typeMarkdownInto(element, markdownText, options = {}) {
            const charsPerSecond = options.charsPerSecond ?? 10; // Adjust this value to make typing faster or slower
            const intervalMs = options.intervalMs ?? 30;
            const minCharsPerTick = options.minCharsPerTick ?? 2;
            const renderEveryTicks = options.renderEveryTicks ?? 1;

            if (activeTypingTimer) {
                clearInterval(activeTypingTimer);
                activeTypingTimer = null;
            }

            const charsPerTick = Math.max(minCharsPerTick, Math.round((charsPerSecond * intervalMs) / 1000));
            let index = 0;
            let tick = 0;

            renderMarkdownInto(element, '');

            activeTypingTimer = setInterval(() => {
                index = Math.min(markdownText.length, index + charsPerTick);
                tick += 1;

                if (tick % renderEveryTicks === 0 || index >= markdownText.length) {
                    renderMarkdownInto(element, markdownText.slice(0, index));
                    element.scrollTop = element.scrollHeight;
                }

                if (index >= markdownText.length) {
                    clearInterval(activeTypingTimer);
                    activeTypingTimer = null;
                }
            }, intervalMs);
        }

        document.getElementById('esgEvalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const companySelect = document.getElementById('companySelect');
            const criteriaSelect = document.getElementById('criteriaSelect');
            const reportOutput = document.getElementById('reportOutput');

            const companyLabel = companySelect.options[companySelect.selectedIndex]?.text ?? '';
            const criteriaLabel = criteriaSelect.options[criteriaSelect.selectedIndex]?.text ?? '';
            const company = companySelect.value;
            const criterion = criteriaSelect.value;

            const query = `Evaluate ${companyLabel}'s ${criteriaLabel}. Provide a structured ESG report with key findings.`;

            typeMarkdownInto(reportOutput, `Generating report for **${companyLabel}** (${criteriaLabel})...`, { charsPerSecond: 60 });

            try {
                // Detect if we're behind Nuvolos proxy and adjust API path accordingly
                const basePath = window.location.pathname.startsWith('/proxy/') 
                    ? '/proxy/3000' 
                    : '';
                
                const response = await fetch(basePath + '/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company,
                        criterion,
                        query,
                        top_k: 3,
                        format: 'markdown'
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    const detail = data?.detail ?? 'Unknown error';
                    typeMarkdownInto(reportOutput, `# Error\n\n${detail}`);
                    return;
                }

                const report = data?.report ?? '# Error\n\nBackend response missing `report`.';
                typeMarkdownInto(reportOutput, report);
            } catch (err) {
                typeMarkdownInto(reportOutput, `# Network Error\n\n${err?.message ?? String(err)}`);
            }
        });
    </script>
</body>
</html>
