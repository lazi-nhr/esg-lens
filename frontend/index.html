<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Evaluation</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ESG Evaluation</h1>
            <p>Select a company and an evaluation criterion</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Evaluation Setup</h2>
                <form id="esgEvalForm">
                    <div class="eval-row">
                        <div class="form-group">
                            <label for="companySelect">Company</label>
                            <select id="companySelect" required>
                                <option value="" selected disabled>Select a company...</option>
                                <option value="apple">Apple</option>
                                <option value="microsoft">Microsoft</option>
                                <option value="tesla">Tesla</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="criteriaSelect">ESG Evaluation Criterion</label>
                            <select id="criteriaSelect" required>
                                <option value="" selected disabled>Select a criterion...</option>
                                <option value="overall">Overall ESG Assessment</option>
                                <option value="environment">Environment (E) Summary</option>
                            </select>
                        </div>
                        <div class="form-group action-group">
                            <label aria-hidden="true">&nbsp;</label>
                            <button type="submit">Evaluate</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2>Evaluation Report</h2>
                <div id="reportOutput" class="report-output">Choose a company and a criterion, then click Evaluate.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
    
    <script src="app.js" defer></script>
</body>
</html>
