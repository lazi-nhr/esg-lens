<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Evaluation</title>
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="RAG4ESG Logo" class="logo">
            <button id="themeToggle" class="theme-toggle">Dark Mode</button>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Evaluation Setup</h2>
                <form id="esgEvalForm">
                    <div class="eval-row">
                        <div class="form-group">
                            <label for="companySelect">Company</label>
                            <select id="companySelect" required>
                                <option value="" disabled selected>Select a company...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="criteriaSelect">ESG Evaluation Criterion</label>
                            <select id="criteriaSelect" required>
                                <option value="" selected disabled>Select a criterion...</option>
                            </select>
                        </div>
                        <div class="form-group action-group">
                            <label aria-hidden="true">&nbsp;</label>
                            <button type="submit" class="primary-btn">Evaluate</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card">
                <div class="report-header">
                    <h2>Evaluation Report</h2>
                    <button id="downloadPdfBtn" class="primary-btn download-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        PDF
                    </button>
                </div>
                <div id="reportOutput" class="report-output">Choose a company and a criterion, then click Evaluate.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="app.js?v=20" defer></script>
</body>
</html>
